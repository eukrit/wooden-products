# cloudbuild.yaml — salesheet-leka
# Triggered by push to main affecting website/salesheet/**
# Deploys Cloud Run service "salesheet-leka" in asia-southeast1.
# See docs/salesheet-platform.md §6 for the manual equivalent.

substitutions:
  _SERVICE: salesheet-leka
  _REGION: asia-southeast1
  _REPO: asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build-image
    args:
      - 'build'
      - '-t'
      - '$_REPO/$_SERVICE:$SHORT_SHA'
      - '-t'
      - '$_REPO/$_SERVICE:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: push-image
    args: ['push', '--all-tags', '$_REPO/$_SERVICE']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE'
      - '--image=$_REPO/$_SERVICE:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--port=8080'
      - '--service-account=claude@ai-agents-go.iam.gserviceaccount.com'
      - '--set-env-vars=SLACK_LEAD_CHANNEL=C07EF698Q1K'
      - '--set-secrets=SLACK_BOT_TOKEN=slack-bot-token:latest'
      - '--quiet'

images:
  - '$_REPO/$_SERVICE:$SHORT_SHA'
  - '$_REPO/$_SERVICE:latest'

tags:
  - 'salesheet-leka'
  - '$BRANCH_NAME'
  - '$SHORT_SHA'

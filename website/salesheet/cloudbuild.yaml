# cloudbuild.yaml — salesheet-leka
# Triggered by push to main affecting website/salesheet/**
# Deploys Cloud Run service "salesheet-leka" in asia-southeast1.
# See docs/salesheet-platform.md §6 for the manual equivalent.

substitutions:
  _SERVICE: salesheet-leka
  _REGION: asia-southeast1
  _REPO: asia-southeast1-docker.pkg.dev/ai-agents-go/cloud-run-source-deploy

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

steps:
  # Stage the frozen order-portal config into the Docker build context.
  # Dockerfile uses `dir: website/salesheet` so files outside that folder
  # (like data/catalog/) aren't visible unless we copy them in first.
  - name: 'gcr.io/cloud-builders/gcloud'
    id: stage-config
    entrypoint: bash
    args:
      - '-c'
      - |
        mkdir -p website/salesheet/data/catalog
        cp data/catalog/order-portal-config.json website/salesheet/data/catalog/
        echo "Staged:" && ls -la website/salesheet/data/catalog/

  - name: 'gcr.io/cloud-builders/docker'
    id: build-image
    dir: website/salesheet
    args:
      - 'build'
      - '-t'
      - '$_REPO/$_SERVICE:$SHORT_SHA'
      - '-t'
      - '$_REPO/$_SERVICE:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: push-image
    args: ['push', '--all-tags', '$_REPO/$_SERVICE']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE'
      - '--image=$_REPO/$_SERVICE:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--port=8080'
      - '--service-account=claude@ai-agents-go.iam.gserviceaccount.com'
      # Phase 1 adds FIREBASE_PROJECT_ID + GCP_PROJECT_ID plain env vars. The
      # FLASK_SECRET_KEY + FIREBASE_WEB_API_KEY + BOT_API_CLIENT_ID + Xero
      # secrets are provisioned in Phase 6 before being referenced here; until
      # then the order portal runs in "config pending" mode (login page shows
      # a banner, authenticated routes return 503 with a clear message).
      - '--set-env-vars=SLACK_LEAD_CHANNEL=C07EF698Q1K,SLACK_ORDER_CHANNEL=C0AUABRBK41,GEMINI_IMAGE_MODEL=gemini-2.5-flash-image,RENDER_DAILY_BUDGET=200,FIREBASE_PROJECT_ID=ai-agents-go,GCP_PROJECT_ID=ai-agents-go'
      - '--set-secrets=SLACK_BOT_TOKEN=slack-bot-token:latest,GEMINI_API_KEY=gemini-api-key:latest'
      - '--quiet'

images:
  - '$_REPO/$_SERVICE:$SHORT_SHA'
  - '$_REPO/$_SERVICE:latest'

tags:
  - 'salesheet-leka'
  - '$BRANCH_NAME'
  - '$SHORT_SHA'

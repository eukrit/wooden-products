# cloudbuild.yaml — salesheet-leka
# Triggered by push to main affecting website/salesheet/**
# Deploys Cloud Run service "salesheet-leka" in asia-southeast1.
# See docs/salesheet-platform.md §6 for the manual equivalent.

substitutions:
  _SERVICE: salesheet-leka
  _REGION: asia-southeast1
  _REPO: asia-southeast1-docker.pkg.dev/ai-agents-go/cloud-run-source-deploy

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

steps:
  # Stage all data/catalog/*.json into the Docker build context.
  # Dockerfile uses `dir: website/salesheet` so files outside that folder
  # aren't visible unless we copy them in first. order_portal/pricing.py
  # reads leka-taxonomy.json + leka-sku-map.json; order_portal/config.py
  # reads order-portal-config.json.
  - name: 'gcr.io/cloud-builders/gcloud'
    id: stage-config
    entrypoint: bash
    args:
      - '-c'
      - |
        mkdir -p website/salesheet/data/catalog
        cp data/catalog/*.json website/salesheet/data/catalog/
        echo "Staged:" && ls -la website/salesheet/data/catalog/

  # Stage the canonical fence calculator into the order_portal package so
  # /api/configurator/cost-quote can import it. order_portal/fence_calc.py
  # picks up _fence_calc_bundled/ first and falls back to the repo path
  # for local dev.
  - name: 'gcr.io/cloud-builders/gcloud'
    id: stage-fence-calc
    entrypoint: bash
    args:
      - '-c'
      - |
        BUNDLED=website/salesheet/order_portal/_fence_calc_bundled
        rm -rf "$$BUNDLED"
        mkdir -p "$$BUNDLED"
        cp scripts/fence-calculator/calculator.py "$$BUNDLED/"
        cp scripts/fence-calculator/fence_params.json "$$BUNDLED/"
        echo "Staged:" && ls -la "$$BUNDLED"

  # Stage the project's docs/ folder into the salesheet build context so
  # the Flask app can serve /hub (docs/hub.live.html) and /docs/<file>.
  # docs/ is at the repo root (Rule 13); cloudbuild's `dir: website/salesheet`
  # otherwise hides it from the Docker context.
  - name: 'gcr.io/cloud-builders/gcloud'
    id: stage-docs
    entrypoint: bash
    args:
      - '-c'
      - |
        STAGED=website/salesheet/_docs_staged
        rm -rf "$$STAGED"
        mkdir -p "$$STAGED"
        cp -r docs/. "$$STAGED/"
        echo "Staged docs:" && find "$$STAGED" -maxdepth 2 -type f | head -30

  - name: 'gcr.io/cloud-builders/docker'
    id: build-image
    dir: website/salesheet
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - '$_REPO/$_SERVICE:$SHORT_SHA'
      - '-t'
      - '$_REPO/$_SERVICE:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: push-image
    args: ['push', '--all-tags', '$_REPO/$_SERVICE']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE'
      - '--image=$_REPO/$_SERVICE:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--port=8080'
      - '--service-account=claude@ai-agents-go.iam.gserviceaccount.com'
      # Phase 6 wires the full set of Order Portal secrets. Run
      # `scripts/setup_order_portal_secrets.sh` ONCE before deploying to
      # create the new secrets + grant IAM. If any secret referenced below
      # doesn't exist, the deploy step will fail with a clear error.
      - '--set-env-vars=SLACK_LEAD_CHANNEL=C07EF698Q1K,SLACK_ORDER_CHANNEL=C0AUABRBK41,GEMINI_IMAGE_MODEL=gemini-2.5-flash-image,RENDER_DAILY_BUDGET=200,FIREBASE_PROJECT_ID=ai-agents-go,GCP_PROJECT_ID=ai-agents-go,XERO_TOKENS_SECRET_NAME=xero-tokens,XERO_DEFAULT_ACCOUNT_CODE=200'
      - '--set-secrets=SLACK_BOT_TOKEN=slack-bot-token:latest,SLACK_SIGNING_SECRET=slack-signing-secret:latest,GEMINI_API_KEY=gemini-api-key:latest,FLASK_SECRET_KEY=salesheet-flask-session-key:latest,FIREBASE_WEB_API_KEY=firebase-web-api-key:latest,XERO_CLIENT_ID=xero-client-id:latest,XERO_CLIENT_SECRET=xero-client-secret:latest,XERO_TENANT_ID=xero-tenant-id:latest,XERO_TOKENS_JSON=xero-tokens:latest'
      - '--quiet'

images:
  - '$_REPO/$_SERVICE:$SHORT_SHA'
  - '$_REPO/$_SERVICE:latest'

tags:
  - 'salesheet-leka'
  - '$BRANCH_NAME'
  - '$SHORT_SHA'
